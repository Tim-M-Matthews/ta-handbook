# Pages CMS — https://pagescms.org/
# Quick start: https://pagescms.org/docs/quick-start/
# Hosted app: https://app.pagescms.org/ (GitHub sign-in + install the GitHub App on this repo)

media:
  input: public/handbook-media
  output: /handbook-media

content:
  - name: handbook_pages
    label: Handbook pages
    type: collection
    path: content/pages
    format: yaml-frontmatter
    subfolders: true
    exclude:
      - README.md
    filename:
      template: "{primary}.md"
      field: create
    view:
      primary: title
      sort: order
      order: asc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: category
        label: Category
        type: string
        description: Groups pages on the handbook home (e.g. General, Clinical, Operations).
      - name: order
        label: Sort order
        type: number
        description: Lower values appear first within the same category.
      - name: roles
        label: Required roles
        type: string
        list: true
        description: >
          Leave empty so any user listed in HANDBOOK_ROLE_MAP can view the page.
          Otherwise add one or more role names; the user needs at least one match.
          Users with the admin role always see every page.
      - name: body
        label: Content
        type: rich-text
        description: >
          Visual editor in Pages CMS; saved as HTML in the file below the frontmatter.
          Existing Markdown-only pages still render as Markdown until edited and saved as rich text.
          Images: upload via Media, then insert — stored under /handbook-media/...
